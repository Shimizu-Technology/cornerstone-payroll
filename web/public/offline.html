<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Cornerstone Payroll</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Plus Jakarta Sans",system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;color:#0f172a}
    .wrap{text-align:center;max-width:420px;padding:2rem}
    .icon{width:64px;height:64px;margin:0 auto 1.5rem;border-radius:16px;background:linear-gradient(135deg,#1d5fd2,#194baa);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px}
    h1{font-size:1.5rem;font-weight:600;margin-bottom:.5rem}
    p{color:#64748b;font-size:.925rem;line-height:1.6}
    button{margin-top:1.5rem;padding:.625rem 1.5rem;border:1px solid #e2e8f0;border-radius:12px;background:#fff;font-size:.875rem;font-weight:500;cursor:pointer;transition:background .15s}
    button:hover{background:#f1f5f9}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">CP</div>
    <h1>You're offline</h1>
    <p>Cornerstone Payroll requires an internet connection. Please check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
